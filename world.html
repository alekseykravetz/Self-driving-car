<!doctype html>
<html>
  <head>
    <title>World Editor</title>
    <link rel="stylesheet" href="/styles/world/styles.css" />
  </head>
  <body>
    <h1>World Editor</h1>
    <canvas id="myCanvas"></canvas>
    <canvas
      id="miniMapCanvas"
      style="
        position: absolute;
        right: 20px;
        bottom: 20px;
        background-color: #2a5;
        outline: 2px solid black;
      "
    ></canvas>

    <div id="controls">
      <input id="worldGenerationInput" type="checkbox" />
      <button id="disposeBtn">🗑️</button>
      <button id="saveBtn">💾</button>
      <label for="loadWorldInput" class="file-input-label">
        📁
        <input type="file" id="loadWorldInput" accept=".world" />
      </label>
      &nbsp;
      <button id="openOsmPanelBtn">🗺️</button>
      &nbsp; &nbsp;
      <button id="graphBtn">🌐</button>
      &nbsp;
      <button id="markingBtn">🔲</button>
      <button id="startBtn">🚙</button>
      <button id="targetBtn">🎯</button>
      <button id="stopBtn">🛑</button>
      <button id="crossingBtn">🚶</button>
      <button id="yieldBtn">⚠️</button>
      <button id="parkingBtn">🅿️</button>
      <button id="lightBtn">🚦</button>

      <div id="osmPanel" style="display: none">
        <textarea
          id="osmDataContainer"
          rows="10"
          cols="50"
          placeholder="Paste OSM data here"
        ></textarea>
        <div>
          <button id="parseOsmDataBtn">✔️</button>
          <button id="closeOsmPanelBtn">❌</button>
        </div>
      </div>
    </div>

    <script src="js/world/types.ts"></script>

    <script src="js/world/world.js"></script>
    <script src="js/world/viewport.js"></script>
    <script src="js/world/trafficManager.js"></script>
    <script src="js/world/miniMap.js"></script>
    <script src="js/world/markings/marking.js"></script>
    <script src="js/world/markings/stop.js"></script>
    <script src="js/world/markings/start.js"></script>
    <script src="js/world/markings/crossing.js"></script>
    <script src="js/world/markings/parking.js"></script>
    <script src="js/world/markings/light.js"></script>
    <script src="js/world/markings/target.js"></script>
    <script src="js/world/markings/yield.js"></script>
    <script src="js/world/editors/markingEditor.js"></script>
    <script src="js/world/editors/worldEditor.js"></script>
    <script src="js/world/editors/graphEditor.js"></script>
    <script src="js/world/editors/stopEditor.js"></script>
    <script src="js/world/editors/startEditor.js"></script>
    <script src="js/world/editors/crossingEditor.js"></script>
    <script src="js/world/editors/parkingEditor.js"></script>
    <script src="js/world/editors/lightEditor.js"></script>
    <script src="js/world/editors/targetEditor.js"></script>
    <script src="js/world/editors/yieldEditor.js"></script>
    <script src="js/world/items/tree.js"></script>
    <script src="js/world/items/building.js"></script>
    <script src="js/world/math/utils.js"></script>
    <script src="js/world/math/graph.js"></script>
    <script src="js/world/math/osm.js"></script>
    <script src="js/world/primitives/point.js"></script>
    <script src="js/world/primitives/segment.js"></script>
    <script src="js/world/primitives/polygon.js"></script>
    <script src="js/world/primitives/envelope.js"></script>

    <!-- <script src="saves/barnea.world"></script> -->
    <!-- <script src="saves/kohav-hazafon.world"></script> -->
    <!-- <script src="saves/ir-hyain.world"></script> -->
    <!-- <script src="saves/kohav-hazafon-with-target.world"></script> -->
    <!-- <script src="saves/ashkelon.world"></script> -->
    <!-- <script src="saves/path_finding.world"></script> -->

    <script>
      myCanvas.width = 800;
      myCanvas.height = 490;

      miniMapCanvas.width = 150;
      miniMapCanvas.height = 150;

      const worldEditor = new WorldEditor(myCanvas, miniMapCanvas);
      worldEditor.animate();
    </script>
  </body>
</html>
