<!doctype html>
<html>
  <head>
    <title>Self-driving car - Race</title>
    <link rel="stylesheet" href="/styles/style.css" />
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>
    <canvas
      id="cameraCanvas"
      style="
        top: 50%;
        left: 50%;
        position: absolute;
        transform: translate(-50%, -50%);
      "
    ></canvas>
    <canvas id="miniMapCanvas" class="miniMap" style="display: none"></canvas>
    <div id="statistics" style="display: none"></div>
    <div id="counter"></div>

    <script src="/js/world-editor/world.js"></script>
    <script src="/js/mini-map/miniMap.js"></script>
    <script src="/js/viewport/viewport.js"></script>
    <script src="/js/world-editor/trafficManager.js"></script>
    <script src="/js/world-editor/markings/marking.js"></script>
    <script src="/js/world-editor/markings/stop.js"></script>
    <script src="/js/world-editor/markings/start.js"></script>
    <script src="/js/world-editor/markings/crossing.js"></script>
    <script src="/js/world-editor/markings/parking.js"></script>
    <script src="/js/world-editor/markings/light.js"></script>
    <script src="/js/world-editor/markings/target.js"></script>
    <script src="/js/world-editor/markings/yield.js"></script>
    <script src="/js/world-editor/editors/markingEditor.js"></script>
    <script src="/js/world-editor/editors/graphEditor.js"></script>
    <script src="/js/world-editor/editors/stopEditor.js"></script>
    <script src="/js/world-editor/editors/startEditor.js"></script>
    <script src="/js/world-editor/editors/crossingEditor.js"></script>
    <script src="/js/world-editor/editors/parkingEditor.js"></script>
    <script src="/js/world-editor/editors/lightEditor.js"></script>
    <script src="/js/world-editor/editors/targetEditor.js"></script>
    <script src="/js/world-editor/editors/yieldEditor.js"></script>
    <script src="/js/world-editor/items/tree.js"></script>
    <script src="/js/world-editor/items/building.js"></script>
    <script src="/js/math/utils.js"></script>
    <script src="/js/math/graph/graph.js"></script>
    <script src="/js/math/primitives/point.js"></script>
    <script src="/js/math/primitives/segment.js"></script>
    <script src="/js/math/primitives/polygon.js"></script>
    <script src="/js/math/primitives/envelope.js"></script>

    <!-- <script src="/saves/kohav-hazafon.world"></script> -->
    <script src="/saves/kohav-hazafon-with-target.world"></script>
    <!-- <script src="/saves/ashkelon.world"></script> -->
    <!-- <script src="/saves/path_finding.world"></script> -->
    <script src="/saves/right_hand_rule.car"></script>

    <script src="/js/car/controls/phoneControls.js"></script>
    <script src="/js/camera.js"></script>
    <script src="/js/sound.js"></script>
    <script src="/js/neural-network/visualizer.js"></script>
    <script src="/js/neural-network/network.js"></script>
    <script src="/js/car/sensors/sensor.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/car/controls/controls.js"></script>
    <script src="/js/car/car.js"></script>
    <script src="/js/games/race.js"></script>

    <script>
      // gameCanvas.height = window.innerHeight / 2;
      // cameraCanvas.height = window.innerHeight / 2;
      gameCanvas.height = 0;
      cameraCanvas.height = window.innerHeight;
      // gameCanvas.height = window.innerHeight;
      // cameraCanvas.height = 0;

      gameCanvas.width = window.innerWidth;
      cameraCanvas.width = window.innerWidth;

      document.body.style.flexDirection = 'column';

      const rightPanelWidth = 250;
      miniMapCanvas.width = rightPanelWidth;
      miniMapCanvas.height = rightPanelWidth;

      statistics.style.width = `${rightPanelWidth}px`;
      statistics.style.height = `${window.innerHeight - 60 - rightPanelWidth}px`;

      // Special code part for phone devices

      const controls = new PhoneControls(cameraCanvas);

      document.addEventListener('click', (e) => {
        if (document.body.requestFullscreen) {
          document.body.requestFullscreen();
        } else if (document.body.webkitRequestFullscreen) {
          document.body.webkitRequestFullscreen();
        } else if (document.body.mozRequestFullScreen) {
          document.body.mozRequestFullScreen();
        } else if (document.body.msRequestFullscreen) {
          document.body.msRequestFullscreen();
        }
      });

      const race = new Race(gameCanvas, cameraCanvas, miniMapCanvas, controls);
    </script>
  </body>
</html>
