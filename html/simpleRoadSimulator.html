<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Self-driving car - No libraries</title>
    <link rel="stylesheet" href="/styles/style.css" />
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <div id="verticalButtons">
      <button onclick="save()">💾</button>
      <button onclick="discard()">🗑️</button>
      <input
        type="number"
        id="carCount"
        value="100"
        min="1"
        max="5000"
        step="100"
        title="Number of cars"
        style="width: 50px"
      />
      <input
        type="number"
        id="threshold"
        value="0.1"
        step="0.01"
        min="0"
        max="1"
        title="Mutation threshold (amount)"
        style="width: 50px"
      />
      <button onclick="restart()" title="Restart Training">🔄</button>
    </div>

    <canvas id="networkCanvas"></canvas>

    <script src="/js/math/utils.js"></script>
    <script src="/js/math/primitives/point.js"></script>

    <script src="/js/sound.js"></script>
    <script src="/js/neural-network/visualizer.js"></script>
    <script src="/js/neural-network/network.js"></script>
    <script src="/js/car/sensors/sensor.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/road.js"></script>
    <script src="/js/car/controls/controls.js"></script>
    <script src="/js/car/car.js"></script>
    <script src="/js/ai-training/simpleRoadSimulator.js"></script>
  </body>
</html>
