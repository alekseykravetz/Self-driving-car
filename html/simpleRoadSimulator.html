<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Self-driving car - No libraries</title>
    <link rel="stylesheet" href="/styles/style.css" />
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <div id="verticalButtons"></div>
    <script>
      (function () {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', '/html/controlPanel.html', false);
        xhr.send(null);
        if (xhr.status === 200) {
          const container = document.getElementById('verticalButtons');
          container.innerHTML = xhr.responseText;
          const worldLoaderCtrl = container.querySelector('#worldLoaderCtrl');
          const worldLoaderDivider = container.querySelector(
            '#worldLoaderDivider',
          );
          if (worldLoaderCtrl) worldLoaderCtrl.style.display = 'none';
          if (worldLoaderDivider) worldLoaderDivider.style.display = 'none';
        }
      })();
    </script>

    <canvas id="networkCanvas"></canvas>

    <script src="/js/math/utils.js"></script>
    <script src="/js/math/primitives/point.js"></script>

    <script src="/js/sound.js"></script>
    <script src="/js/neural-network/visualizer.js"></script>
    <script src="/js/neural-network/network.js"></script>
    <script src="/js/car/sensors/sensor.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/road.js"></script>
    <script src="/js/car/controls/controls.js"></script>
    <script src="/js/car/car.js"></script>
    <script src="/js/ai-training/trainingManager.js"></script>
    <script src="/js/ai-training/simulatorUtils.js"></script>
    <script src="/js/ai-training/simpleRoadSimulator.js"></script>
  </body>
</html>
