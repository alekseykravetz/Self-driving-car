<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Self-driving car - No libraries</title>
    <link rel="stylesheet" href="/styles/style.css" />
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <div id="verticalButtons">
      <!-- ── Stats ───────────────────────────────────────── -->
      <div id="statsPanel">
        <div class="stat-row">
          <span class="stat-emoji">🧬</span>
          <span class="stat-label">Gen</span>
          <span class="stat-value" id="stat-gen">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-emoji">🟢</span>
          <span class="stat-label">Alive</span>
          <span class="stat-value" id="stat-alive">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-emoji">💀</span>
          <span class="stat-label">Dead</span>
          <span class="stat-value" id="stat-dead">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-emoji">❄️</span>
          <span class="stat-label">Idle</span>
          <span class="stat-value" id="stat-frozen">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-emoji">🛣️</span>
          <span class="stat-label">Best</span>
          <span class="stat-value" id="stat-dist">0</span>
        </div>
      </div>

      <div class="ctrl-divider"></div>

      <!-- ── Persist ─────────────────────────────────────── -->
      <div class="ctrl">
        <span class="ctrl-label">Save</span>
        <button onclick="save()">💾</button>
      </div>

      <div class="ctrl">
        <span class="ctrl-label">Discard</span>
        <button onclick="discard()">🗑️</button>
      </div>

      <div class="ctrl-divider"></div>

      <!-- ── Parameters ──────────────────────────────────── -->
      <div class="ctrl">
        <span class="ctrl-label">Cars</span>
        <input
          type="number"
          id="carCount"
          value="100"
          min="0"
          max="5000"
          step="100"
          title="Number of AI cars in the population"
        />
      </div>

      <div class="ctrl">
        <span class="ctrl-label">Pool</span>
        <input
          type="number"
          id="poolCount"
          value="2"
          min="1"
          max="20"
          step="1"
          title="Number of top cars kept in the best pool"
        />
      </div>

      <div class="ctrl">
        <span class="ctrl-label">Mutation</span>
        <input
          type="number"
          id="threshold"
          value="0.2"
          step="0.05"
          min="0.001"
          max="1"
          title="Mutation amount applied each generation"
        />
      </div>

      <div class="ctrl-divider"></div>

      <!-- ── Playback ─────────────────────────────────────── -->
      <div class="ctrl">
        <span class="ctrl-label">Restart</span>
        <button
          onclick="restart()"
          title="Restart training with current settings"
        >
          🔄
        </button>
      </div>

      <div class="ctrl">
        <span class="ctrl-label">Pause</span>
        <button
          id="pauseBtn"
          onclick="togglePause()"
          title="Pause / resume the simulation"
        >
          ⏸️
        </button>
      </div>

      <div class="ctrl-divider"></div>

      <!-- ── Display ──────────────────────────────────────── -->
      <div class="ctrl">
        <span class="ctrl-label">Network</span>
        <input
          type="checkbox"
          id="showVisualizer"
          checked
          title="Show neural network visualizer"
        />
      </div>
    </div>

    <canvas id="networkCanvas"></canvas>

    <script src="/js/math/utils.js"></script>
    <script src="/js/math/primitives/point.js"></script>

    <script src="/js/sound.js"></script>
    <script src="/js/neural-network/visualizer.js"></script>
    <script src="/js/neural-network/network.js"></script>
    <script src="/js/car/sensors/sensor.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/road.js"></script>
    <script src="/js/car/controls/controls.js"></script>
    <script src="/js/car/car.js"></script>
    <script src="/js/ai-training/simpleRoadSimulator.js"></script>
  </body>
</html>
