<!-- ── Stats ───────────────────────────────────────── -->
<div class="panel-section">
  <div class="section-title">Statistics</div>
  <div id="statsPanel">
    <div class="stat-row">
      <span class="stat-emoji">🧬</span>
      <span class="stat-label">Gen</span>
      <span class="stat-value" id="stat-gen">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-emoji">🟢</span>
      <span class="stat-label">Alive</span>
      <span class="stat-value" id="stat-alive">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-emoji">💀</span>
      <span class="stat-label">Dead</span>
      <span class="stat-value" id="stat-dead">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-emoji">❄️</span>
      <span class="stat-label">Idle</span>
      <span class="stat-value" id="stat-frozen">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-emoji">🛣️</span>
      <span class="stat-label">Best Dist</span>
      <span class="stat-value" id="stat-dist">0</span>
    </div>
  </div>
</div>

<!-- ── Simulation Controls ─────────────────────────── -->
<div class="panel-section">
  <div class="section-title">Simulation</div>
  <div class="btn-group-large">
    <button id="pauseBtn" class="btn-lg" title="Pause / resume the simulation">
      ⏸️ Pause
    </button>
    <button
      id="nextGenBtn"
      class="btn-lg btn-primary"
      title="Start next generation (keeps best brains)"
    >
      🧬 Next Gen
    </button>
    <button
      id="newTrainingBtn"
      class="btn-lg btn-danger"
      title="Start fresh training (no brains carried over)"
    >
      🔄 New Training
    </button>
  </div>
</div>

<!-- ── Storage ─────────────────────────────────────── -->
<div class="panel-section">
  <div class="section-title">Storage</div>
  <div class="btn-row">
    <button
      id="saveBtn"
      class="btn-sm"
      title="Save best brain to browser localStorage"
    >
      💾 Browser
    </button>
    <button
      id="saveCarBtn"
      class="btn-sm"
      title="Download car config as .car file"
    >
      📥 File
    </button>
  </div>
  <div class="btn-row">
    <button
      id="discardBtn"
      class="btn-sm btn-danger-outline"
      title="Delete saved brain from localStorage"
    >
      🗑️ Clear
    </button>
    <label
      for="loadCarInput"
      class="btn-sm file-input-label"
      title="Load car config from .car file"
    >
      📂 Import
      <input type="file" id="loadCarInput" accept=".car,.json" />
    </label>
  </div>
</div>

<!-- ── Parameters ──────────────────────────────────── -->
<div class="panel-section">
  <div class="section-title">Training Params</div>
  <div class="param-grid">
    <div class="ctrl">
      <span class="ctrl-label">Cars</span>
      <input
        type="number"
        id="carCount"
        value="100"
        min="0"
        max="5000"
        step="100"
        title="Number of AI cars in the population"
      />
    </div>
    <div class="ctrl">
      <span class="ctrl-label">Pool</span>
      <input
        type="number"
        id="poolCount"
        value="2"
        min="1"
        max="20"
        step="1"
        title="Number of top cars kept in the best pool"
      />
    </div>
    <div class="ctrl">
      <span class="ctrl-label">Mutation</span>
      <input
        type="number"
        id="threshold"
        value="0.2"
        step="0.05"
        min="0.001"
        max="1"
        title="Mutation amount applied each generation"
      />
    </div>
  </div>
</div>

<!-- ── Display ──────────────────────────────────────── -->
<div class="panel-section">
  <div class="section-title">Display</div>
  <div class="toggle-row">
    <span class="ctrl-label">Show Network</span>
    <input
      type="checkbox"
      id="showVisualizer"
      checked
      title="Show neural network visualizer"
    />
  </div>
  <div class="toggle-row">
    <span class="ctrl-label">Show 3D View</span>
    <input
      type="checkbox"
      id="showCameraView"
      checked
      title="Show 3D perspective view of best car"
    />
  </div>
</div>

<!-- ── Car Config ──────────────────────────────────── -->
<div class="panel-section">
  <div class="section-title">Car Config</div>
  <div class="car-config-grid">
    <div class="ctrl">
      <span class="ctrl-label">Max Speed</span>
      <input
        type="number"
        id="carMaxSpeed"
        value="3"
        step="0.5"
        min="1"
        max="20"
        title="Car maximum speed"
      />
    </div>

    <div class="ctrl">
      <span class="ctrl-label">Accel</span>
      <input
        type="number"
        id="carAcceleration"
        value="0.2"
        step="0.01"
        min="0.01"
        max="1"
        title="Car acceleration"
      />
    </div>

    <div class="ctrl">
      <span class="ctrl-label">Friction</span>
      <input
        type="number"
        id="carFriction"
        value="0.05"
        step="0.01"
        min="0.01"
        max="0.5"
        title="Car friction"
      />
    </div>

    <div class="ctrl">
      <span class="ctrl-label">Width</span>
      <input
        type="number"
        id="carWidth"
        value="30"
        step="5"
        min="10"
        max="100"
        title="Car width"
      />
    </div>

    <div class="ctrl">
      <span class="ctrl-label">Height</span>
      <input
        type="number"
        id="carHeight"
        value="50"
        step="5"
        min="20"
        max="150"
        title="Car height"
      />
    </div>

    <div class="ctrl">
      <span class="ctrl-label">Rays</span>
      <input
        type="number"
        id="carRayCount"
        value="5"
        step="1"
        min="1"
        max="20"
        title="Sensor ray count"
      />
    </div>

    <div class="ctrl">
      <span class="ctrl-label">Ray Len</span>
      <input
        type="number"
        id="carRayLength"
        value="150"
        step="10"
        min="50"
        max="500"
        title="Sensor ray length"
      />
    </div>

    <div class="ctrl">
      <span class="ctrl-label">Ray Spread</span>
      <input
        type="number"
        id="carRaySpread"
        value="1.57"
        step="0.1"
        min="0.1"
        max="6.28"
        title="Sensor ray spread (radians)"
      />
    </div>

    <div class="ctrl">
      <span class="ctrl-label">Ray Offset</span>
      <input
        type="number"
        id="carRayOffset"
        value="0"
        step="0.1"
        min="-3.14"
        max="3.14"
        title="Sensor ray offset (radians)"
      />
    </div>
  </div>
</div>
