<!-- ── World Loader ────────────────────────────────── -->
<div class="ctrl" id="worldLoaderCtrl">
  <span class="ctrl-label">Load Map</span>
  <label for="loadWorldInput" class="file-input-label">
    📁
    <input type="file" id="loadWorldInput" accept=".world" />
  </label>
</div>

<div class="ctrl-divider" id="worldLoaderDivider"></div>

<!-- ── Stats ───────────────────────────────────────── -->
<div id="statsPanel">
  <div class="stat-row">
    <span class="stat-emoji">🧬</span>
    <span class="stat-label">Gen</span>
    <span class="stat-value" id="stat-gen">0</span>
  </div>
  <div class="stat-row">
    <span class="stat-emoji">🟢</span>
    <span class="stat-label">Alive</span>
    <span class="stat-value" id="stat-alive">0</span>
  </div>
  <div class="stat-row">
    <span class="stat-emoji">💀</span>
    <span class="stat-label">Dead</span>
    <span class="stat-value" id="stat-dead">0</span>
  </div>
  <div class="stat-row">
    <span class="stat-emoji">❄️</span>
    <span class="stat-label">Idle</span>
    <span class="stat-value" id="stat-frozen">0</span>
  </div>
  <div class="stat-row">
    <span class="stat-emoji">🛣️</span>
    <span class="stat-label">Best</span>
    <span class="stat-value" id="stat-dist">0</span>
  </div>
</div>

<div class="ctrl-divider"></div>

<!-- ── Persist ─────────────────────────────────────── -->
<div class="ctrl">
  <span class="ctrl-label">Save</span>
  <button id="saveBtn">💾</button>
</div>

<div class="ctrl">
  <span class="ctrl-label">Discard</span>
  <button id="discardBtn">🗑️</button>
</div>

<div class="ctrl-divider"></div>

<!-- ── Parameters ──────────────────────────────────── -->
<div class="ctrl">
  <span class="ctrl-label">Cars</span>
  <input
    type="number"
    id="carCount"
    value="100"
    min="0"
    max="5000"
    step="100"
    title="Number of AI cars in the population"
  />
</div>

<div class="ctrl">
  <span class="ctrl-label">Pool</span>
  <input
    type="number"
    id="poolCount"
    value="2"
    min="1"
    max="20"
    step="1"
    title="Number of top cars kept in the best pool"
  />
</div>

<div class="ctrl">
  <span class="ctrl-label">Mutation</span>
  <input
    type="number"
    id="threshold"
    value="0.2"
    step="0.05"
    min="0.001"
    max="1"
    title="Mutation amount applied each generation"
  />
</div>

<div class="ctrl-divider"></div>

<!-- ── Playback ─────────────────────────────────────── -->
<div class="ctrl">
  <span class="ctrl-label">Restart</span>
  <button id="restartBtn" title="Restart training with current settings">
    🔄
  </button>
</div>

<div class="ctrl">
  <span class="ctrl-label">Pause</span>
  <button id="pauseBtn" title="Pause / resume the simulation">⏸️</button>
</div>

<div class="ctrl-divider"></div>

<!-- ── Display ──────────────────────────────────────── -->
<div class="ctrl">
  <span class="ctrl-label">Network</span>
  <input
    type="checkbox"
    id="showVisualizer"
    checked
    title="Show neural network visualizer"
  />
</div>

<div class="ctrl-divider"></div>

<!-- ── Car Config ──────────────────────────────────── -->
<div class="ctrl">
  <span class="ctrl-label">Max Speed</span>
  <input
    type="number"
    id="carMaxSpeed"
    value="3"
    step="0.5"
    min="1"
    max="20"
    title="Car maximum speed"
  />
</div>

<div class="ctrl">
  <span class="ctrl-label">Accel</span>
  <input
    type="number"
    id="carAcceleration"
    value="0.2"
    step="0.01"
    min="0.01"
    max="1"
    title="Car acceleration"
  />
</div>

<div class="ctrl">
  <span class="ctrl-label">Friction</span>
  <input
    type="number"
    id="carFriction"
    value="0.05"
    step="0.01"
    min="0.01"
    max="0.5"
    title="Car friction"
  />
</div>

  <span class="ctrl-label">Width</span>

<div class="ctrl">
  <span class="ctrl-label">Rays</span>
  <input
    type="number"
    id="carRayCount"
    value="5"
    step="1"
    min="1"
    max="20"
    title="Sensor ray count"
  />
</div>

<div class="ctrl">
  <span class="ctrl-label">Ray Len</span>
  <input
    type="number"
    id="carRayLength"
    value="150"
    step="10"
    min="50"
    max="500"
    title="Sensor ray length"
  />
</div>

<div class="ctrl">
  <span class="ctrl-label">Ray Spread</span>
  <input
    type="number"
    id="carRaySpread"
    value="1.57"
    step="0.1"
    min="0.1"
    max="6.28"
    title="Sensor ray spread (radians)"
  />
</div>

<div class="ctrl">
  <span class="ctrl-label">Ray Offset</span>
  <input
    type="number"
    id="carRayOffset"
    value="0"
    step="0.1"
    min="-3.14"
    max="3.14"
    title="Sensor ray offset (radians)"
  />
</div>

<div class="ctrl-divider"></div>

<!-- ── Save / Load Car ─────────────────────────────── -->
<div class="ctrl">
  <span class="ctrl-label">Save Car</span>
  <button id="saveCarBtn" title="Download car config as .car file">📥</button>
</div>

<div class="ctrl">
  <span class="ctrl-label">Load Car</span>
  <label for="loadCarInput" class="file-input-label">
    📂
    <input type="file" id="loadCarInput" accept=".car,.json" />
  </label>
</div>
