<!doctype html>
<html>
  <head>
    <title>World Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="stylesheet" href="/styles/world.css" />
  </head>
  <body>
    <canvas id="myCanvas"></canvas>

    <div id="simulatorToolbar">
      <world-toolbar></world-toolbar>
      <shortcuts-toolbar></shortcuts-toolbar>
      <world-layers-toolbar></world-layers-toolbar>
    </div>
    <canvas
      id="miniMapCanvas"
      style="
        position: absolute;
        right: 20px;
        bottom: 20px;
        background-color: #2a5;
        outline: 2px solid black;
      "
    ></canvas>

    <editor-toolbar></editor-toolbar>

    <div id="osmPanel" style="display: none">
      <textarea
        id="osmDataContainer"
        rows="10"
        cols="50"
        placeholder="Paste OSM data here"
      ></textarea>
      <div>
        <button id="parseOsmDataBtn">✔️</button>
        <button id="closeOsmPanelBtn">❌</button>
      </div>
    </div>

    <script type="module" src="/js/world/entry.js"></script>
  </body>
</html>
