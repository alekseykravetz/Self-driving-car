<!doctype html>
<html>
  <head>
    <title>World Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="stylesheet" href="/styles/world/styles.css" />
  </head>
  <body>
    <canvas id="myCanvas"></canvas>

    <div id="simulatorToolbar">
      <world-toolbar></world-toolbar>
      <shortcuts-toolbar></shortcuts-toolbar>
      <world-layers-toolbar></world-layers-toolbar>
    </div>
    <canvas
      id="miniMapCanvas"
      style="
        position: absolute;
        right: 20px;
        bottom: 20px;
        background-color: #2a5;
        outline: 2px solid black;
      "
    ></canvas>

    <div id="controls">
      <div class="controls-group">
        <button
          id="graphBtn"
          title="Graph Editor — Add/remove road points and segments (Left-click: add, Right-click: connect, Drag: move)"
        >
          🌐
        </button>
        <button
          id="markingBtn"
          title="Marking Editor — Place generic road markings (Left-click: place, Right-click: remove)"
        >
          🔲
        </button>
      </div>

      <div class="controls-divider"></div>

      <div class="controls-group">
        <button
          id="startBtn"
          title="Start — Place car spawn point (Left-click on road)"
        >
          🚙
        </button>
        <button
          id="targetBtn"
          title="Target — Place race destination (Left-click on road)"
        >
          🎯
        </button>
        <button
          id="stopBtn"
          title="Stop — Place stop line marking (Left-click on road)"
        >
          🛑
        </button>
        <button
          id="crossingBtn"
          title="Crossing — Place pedestrian crosswalk (Left-click on road)"
        >
          🚶
        </button>
        <button
          id="yieldBtn"
          title="Yield — Place yield sign marking (Left-click on road)"
        >
          ⚠️
        </button>
        <button
          id="parkingBtn"
          title="Parking — Place parking spot (Left-click on road)"
        >
          🅿️
        </button>
        <button
          id="lightBtn"
          title="Traffic Light — Place traffic light (Left-click on road)"
        >
          🚦
        </button>
        <button
          id="corridorBtn"
          title="Corridor — Build a corridor between two graph points (Left-click start, then end). Hold/latch T for an open tunnel."
        >
          🛤️
        </button>
      </div>
    </div>

    <div id="osmPanel" style="display: none">
      <textarea
        id="osmDataContainer"
        rows="10"
        cols="50"
        placeholder="Paste OSM data here"
      ></textarea>
      <div>
        <button id="parseOsmDataBtn">✔️</button>
        <button id="closeOsmPanelBtn">❌</button>
      </div>
    </div>

    <script type="module" src="/js/world/entry.js"></script>
  </body>
</html>
