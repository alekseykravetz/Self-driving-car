<!doctype html>
<html>
  <head>
    <title>World Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="stylesheet" href="/styles/world/styles.css" />
  </head>
  <body>
    <canvas id="myCanvas"></canvas>

    <div id="simulatorToolbar">
      <world-toolbar></world-toolbar>
      <shortcuts-toolbar></shortcuts-toolbar>
      <world-layers-toolbar></world-layers-toolbar>
    </div>
    <canvas
      id="miniMapCanvas"
      style="
        position: absolute;
        right: 20px;
        bottom: 20px;
        background-color: #2a5;
        outline: 2px solid black;
      "
    ></canvas>

    <div id="controls">
      <div class="controls-group">
        <button
          id="graphBtn"
          title="Graph Editor — Add/remove road points and segments (Left-click: add, Right-click: connect, Drag: move)"
        >
          🌐
        </button>
        <button
          id="markingBtn"
          title="Marking Editor — Place generic road markings (Left-click: place, Right-click: remove)"
        >
          🔲
        </button>
      </div>

      <div class="controls-divider"></div>

      <div class="controls-group">
        <button
          id="startBtn"
          title="Start — Place car spawn point (Left-click on road)"
        >
          🚙
        </button>
        <button
          id="targetBtn"
          title="Target — Place race destination (Left-click on road)"
        >
          🎯
        </button>
        <button
          id="stopBtn"
          title="Stop — Place stop line marking (Left-click on road)"
        >
          🛑
        </button>
        <button
          id="crossingBtn"
          title="Crossing — Place pedestrian crosswalk (Left-click on road)"
        >
          🚶
        </button>
        <button
          id="yieldBtn"
          title="Yield — Place yield sign marking (Left-click on road)"
        >
          ⚠️
        </button>
        <button
          id="parkingBtn"
          title="Parking — Place parking spot (Left-click on road)"
        >
          🅿️
        </button>
        <button
          id="lightBtn"
          title="Traffic Light — Place traffic light (Left-click on road)"
        >
          🚦
        </button>
        <button
          id="corridorBtn"
          title="Corridor — Build a corridor between two graph points (Left-click start, then end). Hold/latch T for an open tunnel."
        >
          🛤️
        </button>
      </div>
    </div>

    <div id="osmPanel" style="display: none">
      <textarea
        id="osmDataContainer"
        rows="10"
        cols="50"
        placeholder="Paste OSM data here"
      ></textarea>
      <div>
        <button id="parseOsmDataBtn">✔️</button>
        <button id="closeOsmPanelBtn">❌</button>
      </div>
    </div>

    <!-- Core Math & Primitives (Foundation) -->
    <script src="/js/math/primitives/point.js"></script>
    <script src="/js/math/primitives/segment.js"></script>
    <script src="/js/math/primitives/polygon.js"></script>
    <script src="/js/math/primitives/envelope.js"></script>
    <script src="/js/math/utils.js"></script>
    <script src="/js/math/graph/graph.js"></script>
    <script src="/js/math/osm-importer/osm.js"></script>

    <!-- World System -->
    <script src="/js/world/types.js"></script>
    <script src="/js/world/corridor.js"></script>
    <script src="/js/world/generation/worldGenerator.js"></script>
    <script src="/js/world/items/tree.js"></script>
    <script src="/js/world/items/building.js"></script>
    <script src="/js/world/markings/marking.js"></script>
    <script src="/js/world/markings/stop.js"></script>
    <script src="/js/world/markings/start.js"></script>
    <script src="/js/world/markings/crossing.js"></script>
    <script src="/js/world/markings/parking.js"></script>
    <script src="/js/world/markings/light.js"></script>
    <script src="/js/world/markings/target.js"></script>
    <script src="/js/world/markings/yield.js"></script>
    <script src="/js/world/editors/markingEditor.js"></script>
    <script src="/js/world/editors/graphEditor.js"></script>
    <script src="/js/world/editors/stopEditor.js"></script>
    <script src="/js/world/editors/startEditor.js"></script>
    <script src="/js/world/editors/crossingEditor.js"></script>
    <script src="/js/world/editors/parkingEditor.js"></script>
    <script src="/js/world/editors/lightEditor.js"></script>
    <script src="/js/world/editors/targetEditor.js"></script>
    <script src="/js/world/editors/yieldEditor.js"></script>
    <script src="/js/world/editors/corridorEditor.js"></script>
    <script src="/js/world/trafficManager.js"></script>
    <script src="/js/world/world.js"></script>
    <script src="/js/world/loader/worldLoader.js"></script>
    <script src="/js/world/editors/worldEditor.js"></script>

    <!-- Rendering & Viewport -->
    <script src="/js/viewport/scaleIndicator.js"></script>
    <script src="/js/viewport/viewport.js"></script>
    <script src="/js/mini-map/miniMap.js"></script>

    <!-- Core Utilities -->
    <script src="/js/utils.js"></script>
    <script src="/js/car/loader/carLoader.js"></script>

    <!-- Storage & Data Management -->
    <script src="/js/store/types.js"></script>
    <script src="/js/store/storeManager.js"></script>

    <!-- UI Panel Templates (before components) -->
    <script src="/js/panels/templates/worldToolbarTemplate.js"></script>
    <script src="/js/panels/templates/shortcutsToolbarTemplate.js"></script>
    <script src="/js/panels/templates/worldLayersToolbarTemplate.js"></script>

    <!-- UI Components/Panels -->
    <script src="/js/panels/modeControls.js"></script>
    <script src="/js/panels/assetSelectors.js"></script>
    <script src="/js/panels/worldToolbar.js"></script>
    <script src="/js/panels/shortcutsToolbar.js"></script>
    <script src="/js/panels/worldLayersToolbar.js"></script>

    <script>
      (async () => {
        await StoreManager.init();
        function resizeCanvas() {
          myCanvas.width = window.innerWidth;
          myCanvas.height = window.innerHeight;
        }

        resizeCanvas();

        miniMapCanvas.width = 150;
        miniMapCanvas.height = 150;

        const worldEditor = new WorldEditor(myCanvas, miniMapCanvas);

        window.addEventListener('resize', () => {
          resizeCanvas();
          worldEditor.animate();
        });

        worldEditor.animate();
      })();
    </script>
  </body>
</html>
