<!doctype html>
<html>
  <head>
    <title>Self-driving car - Simulator</title>
    <link rel="stylesheet" href="/styles/style.css" />
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <div id="verticalButtons">
      <!-- ── World Loader ────────────────────────────────── -->
      <div class="ctrl">
        <span class="ctrl-label">Load Map</span>
        <label for="loadWorldInput" class="file-input-label">
          📁
          <input type="file" id="loadWorldInput" accept=".world" />
        </label>
      </div>

      <div class="ctrl-divider"></div>

      <!-- ── Stats ───────────────────────────────────────── -->
      <div id="statsPanel">
        <div class="stat-row">
          <span class="stat-emoji">🧬</span>
          <span class="stat-label">Gen</span>
          <span class="stat-value" id="stat-gen">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-emoji">🟢</span>
          <span class="stat-label">Alive</span>
          <span class="stat-value" id="stat-alive">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-emoji">💀</span>
          <span class="stat-label">Dead</span>
          <span class="stat-value" id="stat-dead">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-emoji">❄️</span>
          <span class="stat-label">Idle</span>
          <span class="stat-value" id="stat-frozen">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-emoji">🛣️</span>
          <span class="stat-label">Best</span>
          <span class="stat-value" id="stat-dist">0</span>
        </div>
      </div>

      <div class="ctrl-divider"></div>

      <!-- ── Persist ─────────────────────────────────────── -->
      <div class="ctrl">
        <span class="ctrl-label">Save</span>
        <button id="saveBtn">💾</button>
      </div>

      <div class="ctrl">
        <span class="ctrl-label">Discard</span>
        <button id="discardBtn">🗑️</button>
      </div>

      <div class="ctrl-divider"></div>

      <!-- ── Parameters ──────────────────────────────────── -->
      <div class="ctrl">
        <span class="ctrl-label">Cars</span>
        <input
          type="number"
          id="carCount"
          value="100"
          min="0"
          max="5000"
          step="100"
          title="Number of AI cars in the population"
        />
      </div>

      <div class="ctrl">
        <span class="ctrl-label">Pool</span>
        <input
          type="number"
          id="poolCount"
          value="2"
          min="1"
          max="20"
          step="1"
          title="Number of top cars kept in the best pool"
        />
      </div>

      <div class="ctrl">
        <span class="ctrl-label">Mutation</span>
        <input
          type="number"
          id="threshold"
          value="0.2"
          step="0.05"
          min="0.001"
          max="1"
          title="Mutation amount applied each generation"
        />
      </div>

      <div class="ctrl-divider"></div>

      <!-- ── Playback ─────────────────────────────────────── -->
      <div class="ctrl">
        <span class="ctrl-label">Restart</span>
        <button id="restartBtn" title="Restart training with current settings">
          🔄
        </button>
      </div>

      <div class="ctrl">
        <span class="ctrl-label">Pause</span>
        <button id="pauseBtn" title="Pause / resume the simulation">⏸️</button>
      </div>

      <div class="ctrl-divider"></div>

      <!-- ── Display ──────────────────────────────────────── -->
      <div class="ctrl">
        <span class="ctrl-label">Network</span>
        <input
          type="checkbox"
          id="showVisualizer"
          checked
          title="Show neural network visualizer"
        />
      </div>
    </div>

    <div>
      <canvas id="networkCanvas"></canvas>
      <canvas id="miniMapCanvas"></canvas>
    </div>

    <script src="/js/world-editor/world.js"></script>
    <script src="/js/mini-map/miniMap.js"></script>
    <script src="/js/viewport/viewport.js"></script>
    <script src="/js/world-editor/trafficManager.js"></script>
    <script src="/js/world-editor/markings/marking.js"></script>
    <script src="/js/world-editor/markings/stop.js"></script>
    <script src="/js/world-editor/markings/start.js"></script>
    <script src="/js/world-editor/markings/crossing.js"></script>
    <script src="/js/world-editor/markings/parking.js"></script>
    <script src="/js/world-editor/markings/light.js"></script>
    <script src="/js/world-editor/markings/target.js"></script>
    <script src="/js/world-editor/markings/yield.js"></script>
    <script src="/js/world-editor/editors/markingEditor.js"></script>
    <script src="/js/world-editor/editors/graphEditor.js"></script>
    <script src="/js/world-editor/editors/stopEditor.js"></script>
    <script src="/js/world-editor/editors/startEditor.js"></script>
    <script src="/js/world-editor/editors/crossingEditor.js"></script>
    <script src="/js/world-editor/editors/parkingEditor.js"></script>
    <script src="/js/world-editor/editors/lightEditor.js"></script>
    <script src="/js/world-editor/editors/targetEditor.js"></script>
    <script src="/js/world-editor/editors/yieldEditor.js"></script>
    <script src="/js/world-editor/items/tree.js"></script>
    <script src="/js/world-editor/items/building.js"></script>
    <script src="/js/math/utils.js"></script>
    <script src="/js/math/graph/graph.js"></script>
    <script src="/js/math/primitives/point.js"></script>
    <script src="/js/math/primitives/segment.js"></script>
    <script src="/js/math/primitives/polygon.js"></script>
    <script src="/js/math/primitives/envelope.js"></script>

    <!-- <script src="/saves/barnea.world"></script> -->
    <!-- <script src="/saves/big.world"></script> -->
    <!-- <script src="/saves/big_with_target.world"></script> -->
    <!-- <script src="/saves/kohav-hazafon.world"></script> -->
    <!-- <script src="/saves/ashkelon.world"></script> -->
    <script src="/saves/path_finding.world"></script>
    <!-- <script src="/saves/ir-hyain.world"></script> -->

    <script src="/saves/right_hand_rule.car"></script>
    <!-- <script src="/saves/right_hand_rule_racer.car"></script> -->

    <script src="/js/sound.js"></script>
    <script src="/js/neural-network/visualizer.js"></script>
    <script src="/js/neural-network/network.js"></script>
    <script src="/js/car/sensors/sensor.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/car/controls/controls.js"></script>
    <script src="/js/car/car.js"></script>
    <script src="/js/ai-training/trainingManager.js"></script>
    <script src="/js/ai-training/simulator.js"></script>

    <script>
      const rightPanelWidth = 300;
      const buttonsPanelWidth = 30;

      gameCanvas.width =
        window.innerWidth - rightPanelWidth - buttonsPanelWidth;
      gameCanvas.height = window.innerHeight;

      networkCanvas.width = rightPanelWidth;
      networkCanvas.height = window.innerHeight - rightPanelWidth;

      miniMapCanvas.width = rightPanelWidth;
      miniMapCanvas.height = rightPanelWidth;

      const simulator = new Simulator(gameCanvas, networkCanvas, miniMapCanvas);
    </script>
  </body>
</html>
