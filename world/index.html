<!doctype html>
<html>
  <head>
    <title>World Editor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>World Editor</h1>
    <canvas id="myCanvas"></canvas>
    <div id="controls">
      <button onclick="dispose()">🗑️</button>
      <button onclick="save()">💾</button>
      <label for="fileInput" class="file-input-label">
        📁
        <input
          type="file"
          id="fileInput"
          accept=".world"
          onchange="loadWorldFromFile(event)"
        />
      </label>
      <button onclick="openOsmPanel()">🗺️</button>
      &nbsp;
      <button id="graphBtn" onclick="setMode('graph')">🌐</button>
      <button id="markingBtn" onclick="setMode('marking')">🔲</button>
      <button id="startBtn" onclick="setMode('start')">🚙</button>
      <button id="targetBtn" onclick="setMode('target')">🎯</button>
      <button id="stopBtn" onclick="setMode('stop')">🛑</button>
      <button id="crossingBtn" onclick="setMode('crossing')">🚶</button>
      <button id="yieldBtn" onclick="setMode('yield')">⚠️</button>
      <button id="parkingBtn" onclick="setMode('parking')">🅿️</button>
      <button id="lightBtn" onclick="setMode('light')">🚦</button>

      <div id="osmPanel" style="display: none">
        <textarea
          id="osmDataContainer"
          rows="10"
          cols="50"
          placeholder="Paste OSM data here"
        ></textarea>
        <div>
          <button onclick="parseOsmData()">✔️</button>
          <button onclick="closeOsmPanel()">❌</button>
        </div>
      </div>
    </div>

    <script src="js/world.js"></script>
    <script src="js/viewport.js"></script>
    <script src="js/markings/marking.js"></script>
    <script src="js/markings/stop.js"></script>
    <script src="js/markings/start.js"></script>
    <script src="js/markings/crossing.js"></script>
    <script src="js/markings/parking.js"></script>
    <script src="js/markings/light.js"></script>
    <script src="js/markings/target.js"></script>
    <script src="js/markings/yield.js"></script>
    <script src="js/editors/markingEditor.js"></script>
    <script src="js/editors/graphEditor.js"></script>
    <script src="js/editors/stopEditor.js"></script>
    <script src="js/editors/startEditor.js"></script>
    <script src="js/editors/crossingEditor.js"></script>
    <script src="js/editors/parkingEditor.js"></script>
    <script src="js/editors/lightEditor.js"></script>
    <script src="js/editors/targetEditor.js"></script>
    <script src="js/editors/yieldEditor.js"></script>
    <script src="js/items/tree.js"></script>
    <script src="js/items/building.js"></script>
    <script src="js/math/utils.js"></script>
    <script src="js/math/graph.js"></script>
    <script src="js/math/osm.js"></script>
    <script src="js/primitives/point.js"></script>
    <script src="js/primitives/segment.js"></script>
    <script src="js/primitives/polygon.js"></script>
    <script src="js/primitives/envelope.js"></script>

    <!-- <script src="saves/kohav-hazafon.world"></script> -->
    <!-- <script src="saves/kohav-hazafon-with-target.world"></script> -->
    <!-- <script src="saves/ashkelon.world"></script> -->
    <!-- <script src="saves/path_finding.world"></script> -->

    <script>
      myCanvas.width = 800;
      myCanvas.height = 490;

      const ctx = myCanvas.getContext('2d');

      let localWorld;
      let viewport;
      let tools;
      let oldGraphHash;

      if (typeof world === 'undefined') {
        const worldString = localStorage.getItem('world');
        const worldInfo = worldString ? JSON.parse(worldString) : null;

        initializeWorldEditor(myCanvas, worldInfo);
      } else {
        initializeWorldEditor(myCanvas, world); // global world info
      }

      animate();

      function animate() {
        viewport.reset();
        if (localWorld.graph.hash() !== oldGraphHash) {
          localWorld.generate();
          oldGraphHash = localWorld.graph.hash();
        }
        const viewPoint = scale(viewport.getOffset(), -1);
        localWorld.draw(ctx, viewPoint);
        ctx.globalAlpha = 0.3;
        for (const tool of Object.values(tools)) {
          tool.editor.display();
        }

        requestAnimationFrame(animate);
      }

      function initializeWorldEditor(canvas, worldInfo) {
        localWorld = worldInfo ? World.load(worldInfo) : new World(new Graph());
        viewport = initializeViewport(
          canvas,
          localWorld.zoom,
          localWorld.offset,
        );
        tools = initializeEditors(viewport, localWorld);
        oldGraphHash = localWorld.graph.hash();
        setMode('graph');
      }

      function initializeViewport(canvas, zoom, offset) {
        return new Viewport(canvas, zoom, offset);
      }

      function initializeEditors(viewport, world) {
        return {
          graph: {
            button: graphBtn,
            editor: new GraphEditor(viewport, world.graph),
          },
          marking: {
            button: markingBtn,
            editor: new MarkingEditor(viewport, world),
          },
          stop: { button: stopBtn, editor: new StopEditor(viewport, world) },
          crossing: {
            button: crossingBtn,
            editor: new CrossingEditor(viewport, world),
          },
          start: { button: startBtn, editor: new StartEditor(viewport, world) },
          parking: {
            button: parkingBtn,
            editor: new ParkingEditor(viewport, world),
          },
          light: { button: lightBtn, editor: new LightEditor(viewport, world) },
          target: {
            button: targetBtn,
            editor: new TargetEditor(viewport, world),
          },
          yield: { button: yieldBtn, editor: new YieldEditor(viewport, world) },
        };
      }

      function dispose() {
        tools['graph'].editor.dispose();
        localWorld.markings.length = 0; // world.markings = []; // don't work!
      }

      function loadWorldFromFile(e) {
        const worldFile = e.target.files[0];

        if (!worldFile) {
          alert('No file selected');
          return;
        }

        const reader = new FileReader();
        reader.readAsText(worldFile);

        reader.onload = function (e) {
          const worldFileContent = e.target.result;

          const removeWorldVariableDeclaration = worldFileContent
            ? worldFileContent.substring(
                worldFileContent.indexOf('(') + 1,
                worldFileContent.lastIndexOf(')'),
              )
            : null;

          if (!removeWorldVariableDeclaration) {
            alert('Wrong file content. use .world extension');
            return;
          }

          const worldInfo = JSON.parse(removeWorldVariableDeclaration);

          initializeWorldEditor(myCanvas, worldInfo);
        };
      }

      function save() {
        localWorld.zoom = viewport.zoom;
        localWorld.offset = viewport.offset;

        const worldString = JSON.stringify(localWorld);

        try {
          localStorage.setItem('world', worldString);
        } catch (error) {
          console.error('World is to big to save in local storage', error);
        }

        const element = document.createElement('a');
        element.setAttribute(
          'href',
          'data:application/json;charset=utf-8,' +
            encodeURIComponent(`const world = World.load(${worldString});`),
        );
        element.setAttribute('download', 'name.world');
        element.click();
      }

      function setMode(mode) {
        disableEditors();
        tools[mode].button.style.backgroundColor = 'white';
        tools[mode].button.style.filter = '';
        tools[mode].editor.enable();
      }

      function disableEditors() {
        for (const tool of Object.values(tools)) {
          tool.button.style.backgroundColor = 'gray';
          tool.button.style.filter = 'grayscale(100%)';
          tool.editor.disable();
        }
      }

      function openOsmPanel() {
        osmPanel.style.display = 'block';
      }

      function closeOsmPanel() {
        osmPanel.style.display = 'none';
      }

      function parseOsmData() {
        const osmData = osmDataContainer.value;
        if (!osmData) {
          alert('No OSM data provided');
          return;
        }
        const result = Osm.parseRoads(JSON.parse(osmData));
        localWorld.graph.points = result.points;
        localWorld.graph.segments = result.segments;
        closeOsmPanel();
      }
    </script>
  </body>
</html>
